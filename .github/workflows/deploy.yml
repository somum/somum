name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject API key into index.html
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          OPENROUTER_API_KEY=$(echo "$ENV_FILE" | grep "^OPENROUTER_API_KEY=" | cut -d '=' -f2-)
          echo "Key found: ${#OPENROUTER_API_KEY} chars"
          sed -i "s|YOUR_OPENROUTER_API_KEY|${OPENROUTER_API_KEY}|g" index.html
          grep -o "Bearer .\{10\}" index.html || echo "Key injection check failed"

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
